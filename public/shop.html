<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BundleStock — Online Shop</title>
  <link rel="stylesheet" href="/shop.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="#" class="brand" data-nav="catalog">
        <span class="brand-mark">BS</span>
        <span class="brand-name">BundleStock</span>
      </a>

      <nav class="nav">
        <button class="nav-link" data-nav="catalog">Menu</button>
        <button class="nav-link" data-nav="orders" data-auth-only>Pesanan Saya</button>
      </nav>

      <div class="actions">
        <button class="icon-btn" id="cartBtn" aria-label="Buka keranjang">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
          <span class="badge" id="cartBadge">0</span>
        </button>
        <div class="auth-area">
          <button class="btn btn-ghost" id="loginBtn">Masuk</button>
          <div class="user-menu" hidden>
            <span class="user-name" id="userName"></span>
            <button class="btn btn-ghost btn-sm" id="logoutBtn">Keluar</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- Catalog view -->
    <section class="view view-catalog" id="view-catalog">
      <div class="hero">
        <div class="container hero-inner">
          <div class="hero-text">
            <h1>Belanja kebutuhan Anda<br/>tanpa ribet.</h1>
            <p>Pilih produk favorit, masukkan ke keranjang, dan checkout dalam beberapa klik.</p>
            <button class="btn btn-primary" id="heroCtaBtn">Mulai Belanja</button>
          </div>
          <div class="hero-art" aria-hidden="true">
            <div class="hero-card hero-card-1"></div>
            <div class="hero-card hero-card-2"></div>
            <div class="hero-card hero-card-3"></div>
          </div>
        </div>
      </div>

      <div class="container catalog">
        <div class="catalog-head">
          <h2>Katalog Produk</h2>
          <div class="search-wrap">
            <input type="search" id="searchInput" placeholder="Cari produk..." />
          </div>
        </div>
        <div class="chips" id="categoryChips"></div>
        <div class="grid" id="productGrid">
          <div class="empty" id="catalogLoading">Memuat produk…</div>
        </div>
      </div>
    </section>

    <!-- Orders view -->
    <section class="view view-orders" id="view-orders" hidden>
      <div class="container">
        <h2 class="section-title">Riwayat Pesanan</h2>
        <div id="ordersList" class="orders-list">
          <div class="empty">Memuat pesanan…</div>
        </div>
      </div>
    </section>
  </main>

  <!-- Cart drawer -->
  <aside class="drawer" id="cartDrawer" aria-hidden="true">
    <div class="drawer-backdrop" data-close-drawer></div>
    <div class="drawer-panel" role="dialog" aria-label="Keranjang belanja">
      <header class="drawer-head">
        <h3>Keranjang</h3>
        <button class="icon-btn" data-close-drawer aria-label="Tutup">✕</button>
      </header>
      <div class="drawer-body" id="cartItems">
        <div class="empty">Keranjang kosong</div>
      </div>
      <footer class="drawer-foot">
        <div class="row total-row">
          <span>Subtotal</span>
          <strong id="cartTotal">Rp 0</strong>
        </div>
        <button class="btn btn-primary btn-block" id="checkoutBtn" disabled>Checkout</button>
      </footer>
    </div>
  </aside>

  <!-- Auth modal -->
  <div class="modal" id="authModal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-panel" role="dialog">
      <header class="modal-head">
        <h3 id="authTitle">Masuk</h3>
        <button class="icon-btn" data-close-modal aria-label="Tutup">✕</button>
      </header>
      <div class="tabs">
        <button class="tab active" data-tab="login">Masuk</button>
        <button class="tab" data-tab="register">Daftar</button>
      </div>
      <form id="loginForm" class="auth-form">
        <label>Email<input type="email" name="email" required autocomplete="email" /></label>
        <label>Password<input type="password" name="password" required autocomplete="current-password" /></label>
        <p class="form-error" id="loginError" hidden></p>
        <button type="submit" class="btn btn-primary btn-block">Masuk</button>
      </form>
      <form id="registerForm" class="auth-form" hidden>
        <label>Nama<input type="text" name="username" required autocomplete="name" /></label>
        <label>Email<input type="email" name="email" required autocomplete="email" /></label>
        <label>Password<input type="password" name="password" required minlength="6" autocomplete="new-password" /></label>
        <p class="form-error" id="registerError" hidden></p>
        <button type="submit" class="btn btn-primary btn-block">Daftar</button>
      </form>
    </div>
  </div>

  <!-- Checkout modal -->
  <div class="modal" id="checkoutModal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-panel" role="dialog">
      <header class="modal-head">
        <h3>Checkout</h3>
        <button class="icon-btn" data-close-modal aria-label="Tutup">✕</button>
      </header>
      <form id="checkoutForm" class="auth-form">
        <label>Nama Penerima<input type="text" name="customer_name" required /></label>
        <label>Alamat Pengiriman<textarea name="address" rows="3" required></textarea></label>
        <label>Catatan (opsional)<textarea name="notes" rows="2"></textarea></label>
        <div class="summary" id="checkoutSummary"></div>
        <p class="form-error" id="checkoutError" hidden></p>
        <button type="submit" class="btn btn-primary btn-block" id="confirmCheckoutBtn">Konfirmasi Pesanan</button>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="/shop.js"></script>
</body>
</html>
